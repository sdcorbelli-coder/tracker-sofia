<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Sofía</title>

<style>
body { background:#0e0e0e; color:#fff; font-family:Arial; padding:20px; }
h1 { color:#c8f060; }

.section {
  border:1px solid #333;
  border-radius:8px;
  padding:15px;
  margin-bottom:20px;
}

.exercise { margin-bottom:15px; }

input { padding:6px; margin:4px; }
button {
  padding:6px 10px;
  background:#c8f060;
  border:none;
  cursor:pointer;
}

.log { font-size:12px; color:#aaa; }
.warm { color:#888; }
.good { color:#8cff8c; }
.bad { color:#ff8c8c; }
</style>
</head>

<body>

<h1>TRACKER</h1>

<div class="section">
<h3>Macros diarios</h3>
Prot 169 | Carb 180 | Grasas 52 | Kcal 1865
</div>

<div class="section">
<h3>DÍA 1 - Piernas</h3>

<div class="exercise">
<b>Sentadilla</b><br>

<input placeholder="fecha" id="fecha-sq">
<input placeholder="peso" id="peso-sq">
<input placeholder="series x reps" id="reps-sq">
<input placeholder="nota" id="nota-sq">

<button onclick="log('sq','work')">+ Trabajo</button>
<button onclick="log('sq','warm')">+ Warm-up</button>

<div id="log-sq" class="log"></div>
<div id="sug-sq"></div>
</div>

<div class="exercise">
<b>Prensa</b><br>

<input placeholder="fecha" id="fecha-pr">
<input placeholder="peso" id="peso-pr">
<input placeholder="series x reps" id="reps-pr">
<input placeholder="nota" id="nota-pr">

<button onclick="log('pr','work')">Guardar</button>

<div id="log-pr" class="log"></div>
<div id="sug-pr"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("tracker")||"{}");

function log(id,type){
 let f = document.getElementById("fecha-"+id).value;
 let p = document.getElementById("peso-"+id).value;
 let r = document.getElementById("reps-"+id).value;
 let n = document.getElementById("nota-"+id).value;

 if(!data[id]) data[id]=[];

 data[id].push({f,p,r,n,type});
 localStorage.setItem("tracker", JSON.stringify(data));

 render(id);
}

function render(id){
 let html="";
 let logs = data[id]||[];

 logs.slice(-6).reverse().forEach(l=>{
   let cls = l.type=="warm" ? "warm" : "";
   html += `<div class="${cls}">${l.f} - ${l.p}kg - ${l.r} - ${l.n}</div>`;
 });

 document.getElementById("log-"+id).innerHTML = html;

 evaluar(id);
}

function evaluar(id){
 let logs = (data[id]||[]).filter(l=>l.type=="work").slice(-3);

 if(logs.length<3){
   document.getElementById("sug-"+id).innerHTML="";
   return;
 }

 let ok = logs.every(l=>(l.n||"").toLowerCase().includes("ok"));
 let costo = logs.some(l=>(l.n||"").toLowerCase().includes("cost"));

 let msg="";

 if(ok) msg="<span class='good'>Subir peso</span>";
 else if(costo) msg="<span class='bad'>Mantener</span>";
 else msg="Seguir";

 document.getElementById("sug-"+id).innerHTML=msg;
}

render("sq");
render("pr");

</script>

</body>
</html>
