<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Sofía</title>

<style>
body { font-family: Arial; background:#0e0e0e; color:#fff; padding:20px; }
h1 { color:#c8f060; }

.section {
  margin-bottom:25px;
  padding:15px;
  border:1px solid #333;
  border-radius:8px;
}

input, button {
  padding:6px;
  margin:4px;
}

button {
  background:#c8f060;
  border:none;
  cursor:pointer;
}

.log {
  font-size:12px;
  color:#aaa;
  margin-top:10px;
}

.good { color:#8cff8c; }
.bad { color:#ff8c8c; }
</style>
</head>

<body>

<h1>TRACKER</h1>

<div class="section">
<h3>Macros diarios</h3>
<div id="macros"></div>
</div>

<div class="section">
<h3>Sentadilla</h3>

<input id="peso" placeholder="peso (kg)">
<input id="nota" placeholder="nota (tecnica ok / costo)">

<button onclick="log()">Guardar</button>

<div id="log" class="log"></div>
<div id="sugerencia"></div>

</div>

<script>
const target = {p:169,c:180,f:52,k:1865};

document.getElementById("macros").innerText =
`Prot ${target.p} | Carb ${target.c} | Grasas ${target.f} | Kcal ${target.k}`;

let logs = JSON.parse(localStorage.getItem("logs")||"[]");

function log(){
 let peso = document.getElementById("peso").value;
 let nota = document.getElementById("nota").value;

 if(!peso) return;

 logs.push({peso,nota});
 localStorage.setItem("logs", JSON.stringify(logs));

 document.getElementById("peso").value="";
 document.getElementById("nota").value="";

 render();
}

function render(){
 let html="";

 logs.slice(-5).forEach(l=>{
  html+= `<div>${l.peso} kg - ${l.nota}</div>`;
 });

 document.getElementById("log").innerHTML=html;

 evaluar();
}

function evaluar(){
 let ult = logs.slice(-3);

 if(ult.length<3){
  document.getElementById("sugerencia").innerHTML="";
  return;
 }

 let ok = ult.every(l=> (l.nota||"").toLowerCase().includes("ok"));
 let costo = ult.some(l=> (l.nota||"").toLowerCase().includes("cost"));

 let msg="";

 if(ok) msg="<span class='good'>Subir peso</span>";
 else if(costo) msg="<span class='bad'>Mantener</span>";
 else msg="Seguir igual";

 document.getElementById("sugerencia").innerHTML=msg;
}

render();
</script>

</body>
</html>
